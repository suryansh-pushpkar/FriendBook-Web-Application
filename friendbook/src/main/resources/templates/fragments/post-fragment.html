<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="post-card(post, currentUser)">
    <div class="post-card" th:id="'post-' + ${post.id}">
        <div class="post-header">
            <img th:src="${post.user.profileImage != null && post.user.profileImage != 'default.png'} ? @{'/assets/' + ${post.user.profileImage}} : @{'/assets/default.png'}">
            <a th:href="@{'/profile/' + ${post.user.usernameField}}" th:text="${post.user.usernameField}">username</a>
        </div>
        <div class="post-media">
            <th:block th:each="media : ${post.mediaList}">
                <img th:if="${media.mediaType.startsWith('image/')}" th:src="@{'/assets/' + ${media.filePath}}">
                <video th:if="${media.mediaType.startsWith('video/')}" th:src="@{'/assets/' + ${media.filePath}}" controls></video>
            </th:block>
        </div>
        <div class="post-actions">
            <i class="fa-heart" th:classappend="${#lists.contains(post.likes.![user.id], currentUser.id)} ? 'fa-solid liked' : 'fa-regular'" th:onclick="'toggleLike(' + ${post.id} + ')'"></i>
            <i class="fa-regular fa-comment" th:onclick="'focusComment(' + ${post.id} + ')'"></i>
        </div>
        <div class="post-content">
            <span th:id="'likes-count-' + ${post.id}" th:text="${T(java.lang.Math).max(0, #lists.size(post.likes))} + ' likes'">0 likes</span>
            <div class="caption"><b th:text="${post.user.usernameField}">username</b> <span th:text="${post.caption}">caption text</span></div>
            <div th:id="'comment-list-' + ${post.id}" class="mt-2">
                <div th:each="comment : ${post.comments}" class="comment-item"><b th:text="${comment.user.usernameField}">user</b> <span th:text="${comment.text}">comment</span></div>
            </div>
            <span class="time" th:text="${#temporals.format(post.createdAt, 'dd MMMM yyyy')}">Date</span>
        </div>
        <div class="comment-input-area">
            <input type="text" th:id="'comment-input-' + ${post.id}" class="comment-input" placeholder="Add a comment..." th:onkeyup="'togglePostButton(' + ${post.id} + ')'">
            <button th:id="'comment-btn-' + ${post.id}" class="btn-post-comment" disabled th:onclick="'submitComment(' + ${post.id} + ')'">Post</button>
        </div>
    </div>
</div>
<div th:fragment="post-grid(posts, currentUser)">
    <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5">
        <i class="fa-solid fa-camera fs-1 text-muted mb-3"></i>
        <h2 class="h4 mt-3 mb-2">No posts yet</h2>
        <p class="text-muted mb-0">Moments you share will appear here.</p>
    </div>
    <div th:if="${!#lists.isEmpty(posts)}" class="row g-1 g-md-3">
        <div th:each="post : ${posts}" class="col-4">
            <div class="post-grid-item rounded-2" th:onclick="'openPostModal(' + ${post.id} + ')'">
                <th:block th:if="${!#lists.isEmpty(post.mediaList)}">
                    <th:block th:with="firstMedia=${post.mediaList[0]}">
                        <video th:if="${firstMedia.mediaType.startsWith('video/')}" th:src="@{'/assets/' + ${firstMedia.filePath}}" muted></video>
                        <img th:if="${firstMedia.mediaType.startsWith('image/')}" th:src="@{'/assets/' + ${firstMedia.filePath}}">
                    </th:block>
                </th:block>
            </div>
        </div>
    </div>
    <div class="modal fade" th:id="'postModal-' + ${currentUser.id}" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-body p-0">
                    <div class="row g-0">
                        <div class="col-md-8"><div id="modalPostMedia" class="post-media-modal"></div></div>
                        <div class="col-md-4 d-flex flex-column" style="max-height: 600px;">
                            <div class="post-header-modal p-3 border-bottom"><img id="modalUserAvatar" class="rounded-circle me-2" style="width: 32px; height: 32px;"> <strong id="modalUsername"></strong></div>
                            <div id="modalPostContent" class="flex-grow-1 p-3" style="overflow-y: auto;"></div>
                            <div class="post-actions-modal p-3 border-top">
                                <div class="d-flex gap-3 mb-3"><i id="modalLikeBtn" class="fa-heart fa-lg" style="cursor: pointer;"></i> <i class="fa-regular fa-comment fa-lg" onclick="focusModalComment()"></i></div>
                                <div id="modalLikesCount" class="fw-bold mb-2"></div>
                                <div id="modalCaption" class="mb-3"></div>
                                <div id="modalComments" class="mb-3"></div>
                                <div class="border-top pt-3">
                                    <div class="d-flex"><input type="text" id="modalCommentInput" class="form-control border-0" placeholder="Add a comment..."> <button id="modalCommentBtn" class="btn btn-link text-primary fw-bold" disabled>Post</button></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:fragment="post-scripts">
    <script th:inline="javascript">
        let currentPostId = null;
        function toggleLike(postId) {
            const header = $("meta[name='_csrf_header']").attr("content"), token = $("meta[name='_csrf']").attr("content"), $icon = $(`#post-${postId} .fa-heart, #modalLikeBtn`);
            $.ajax({
                url: `/posts/${postId}/like`, type: 'POST',
                beforeSend: function (xhr) { if (header && token) xhr.setRequestHeader(header, token); },
                success: function (data) {
                    const displayCount = Math.max(0, data.count);
                    if (data.liked) { $icon.removeClass('fa-regular').addClass('fa-solid liked'); } else { $icon.removeClass('fa-solid liked').addClass('fa-regular'); }
                    $(`#likes-count-${postId}, #modalLikesCount`).text(displayCount + ' likes');
                }
            });
        }
        function focusComment(postId) { $(`#comment-input-${postId}`).focus(); }
        function togglePostButton(postId) { const val = $(`#comment-input-${postId}`).val(); $(`#comment-btn-${postId}`).prop('disabled', !val.trim()); }
        function submitComment(postId) {
            const $input = $(`#comment-input-${postId}`), textValue = $input.val(), header = $("meta[name='_csrf_header']").attr("content"), token = $("meta[name='_csrf']").attr("content");
            $.ajax({
                url: `/posts/${postId}/comment`, type: 'POST', contentType: 'application/json', data: JSON.stringify({text: textValue}),
                beforeSend: function (xhr) { if (header && token) xhr.setRequestHeader(header, token); },
                success: function (comment) {
                    const html = `<div class="comment-item"><b>${comment.username}</b> <span>${comment.text}</span></div>`;
                    $(`#comment-list-${postId}, #modalComments`).append(html); $input.val(''); togglePostButton(postId); toggleModalPostButton();
                },
                error: function () { alert("Error posting comment."); }
            });
        }
        function openPostModal(postId) {
            currentPostId = postId;
            const header = $("meta[name='_csrf_header']").attr("content"), token = $("meta[name='_csrf']").attr("content");
            $.ajax({
                url: `/posts/${postId}`, type: 'GET',
                beforeSend: function (xhr) { if (header && token) xhr.setRequestHeader(header, token); },
                success: function (post) {
                    $('#modalUserAvatar').attr('src', post.profileImage && post.profileImage !== 'default.png' ? '/assets/' + post.profileImage : '/assets/default.png');
                    $('#modalUsername').text(post.username);
                    let mediaHtml = '';
                    post.mediaList.forEach(m => {
                        if (m.mediaType.startsWith('image/')) { mediaHtml += `<img src="/assets/${m.filePath}" class="w-100">`; }
                        else if (m.mediaType.startsWith('video/')) { mediaHtml += `<video src="/assets/${m.filePath}" controls class="w-100"></video>`; }
                    });
                    $('#modalPostMedia').html(mediaHtml);
                    $('#modalLikesCount').text(Math.max(0, post.likeCount) + ' likes');
                    $('#modalLikeBtn').toggleClass('fa-solid liked', post.likedByCurrentUser).toggleClass('fa-regular', !post.likedByCurrentUser);
                    $('#modalCaption').html(`<strong>${post.username}</strong> ${post.caption}`);
                    let cHtml = '';
                    if (post.comments) { post.comments.forEach(c => { cHtml += `<div class="comment-item mb-2"><strong>${c.username}</strong> <span>${c.text}</span></div>`; }); }
                    $('#modalComments').html(cHtml); $(`#postModal-${[[${currentUser.id}]]}`).modal('show');
                },
                error: function () { alert("Error loading post."); }
            });
        }
        function focusModalComment() { $('#modalCommentInput').focus(); }
        function toggleModalPostButton() { const val = $('#modalCommentInput').val(); $('#modalCommentBtn').prop('disabled', !val.trim()); }
        function submitModalComment() {
            const val = $('#modalCommentInput').val(), header = $("meta[name='_csrf_header']").attr("content"), token = $("meta[name='_csrf']").attr("content");
            if (!val.trim()) return;
            $.ajax({
                url: `/posts/${currentPostId}/comment`, type: 'POST', contentType: 'application/json', data: JSON.stringify({text: val}),
                beforeSend: function (xhr) { if (header && token) xhr.setRequestHeader(header, token); },
                success: function (c) { $('#modalComments').append(`<div class="comment-item mb-2"><strong>${c.username}</strong> <span>${c.text}</span></div>`); $('#modalCommentInput').val(''); toggleModalPostButton(); },
                error: function () { alert("Error posting comment."); }
            });
        }
        $(document).ready(function() {
            $('#modalCommentInput').on('keyup', toggleModalPostButton);
            $('#modalCommentBtn').on('click', submitModalComment);
            $('#modalLikeBtn').on('click', function() { if (currentPostId) toggleLike(currentPostId); });
        });
    </script>
</div>
</html>
