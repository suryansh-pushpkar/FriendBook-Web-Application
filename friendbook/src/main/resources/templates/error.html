<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error</title>
    <th:block th:replace="~{fragments/styles :: common-head}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
        }
        .error-code {
            font-size: 5rem;
            font-weight: bold;
            color: #667eea;
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 2rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .error-details {
            font-size: 1rem;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .error-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 40px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            color: white;
        }
        .btn-login {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 12px 40px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-left: 10px;
            transition: transform 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <div class="error-code" th:text="${errorCode}">Error</div>
    <div class="error-message" th:text="${errorMessage}">Something Went Wrong</div>
    <div class="error-details" th:text="${errorDetails}">
        An unexpected error has occurred.
    </div>
    <div th:if="${errorCode == 403}">
        <p class="error-details mb-4">
            <strong>You need to be logged in to access this page.</strong>
        </p>
        <a href="/login" class="btn-login">Log In</a>
    </div>
    <a href="/" class="btn-back">Back to Home</a>
</div>
</body>
</html>
