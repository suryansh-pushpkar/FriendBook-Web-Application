<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <title>Edit Profile | FriendBook</title>
    <th:block th:replace="~{fragments/styles :: common-head}"></th:block>
    <style>
        .edit-container { max-width: 800px; margin: 50px auto; }
        .drop-zone {
            border: 2px dashed #007bff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            transition: 0.3s;
            cursor: pointer;
        }
        .drop-zone.dragover { background: #e2e6ea; border-color: #0056b3; }
        .preview-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        .preview-video { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: header}"></div>

<div class="container edit-container">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-5">
            <h2 class="mb-4">Edit Your Profile</h2>
            <form id="editProfileForm" enctype="multipart/form-data">

                <div class="mb-4 text-center">
                    <label class="form-label d-block fw-bold">Profile Picture or Video</label>
                    <div id="dropZone" class="drop-zone">
                        <div id="uploadPrompt">
                            <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>
                            <p>Drag & Drop media here or Click to upload</p>
                        </div>
                        <div id="previewContainer" style="display: none;">
                            <img id="imgPreview" class="preview-img mb-2" src="" alt="Preview">
                            <video id="vidPreview" class="preview-video mb-2" controls style="display: none;"></video>
                            <p class="text-muted small" id="fileNameText"></p>
                        </div>
                        <input type="file" id="fileInput" name="file" hidden accept="image/*,video/*">
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Enter full name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Favorite Songs</label>
                        <input type="text" id="favSongs" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Favorite Books</label>
                        <input type="text" id="favBooks" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Favorite Places</label>
                        <input type="text" id="favPlaces" class="form-control">
                    </div>
                </div>

                <div class="mt-5 d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">Update Profile</button>
                    <a href="javascript:void(0);" onclick="history.back(0)" class="btn btn-outline-secondary px-5 py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const uploadPrompt = document.getElementById('uploadPrompt');
    let selectedFile = null;

    document.addEventListener('DOMContentLoaded', () => {
        const profile = JSON.parse(localStorage.getItem('userProfile'));
        if (profile) {
            document.getElementById('fullName').value = profile.fullName || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('favSongs').value = profile.favSongs || '';
            document.getElementById('favBooks').value = profile.favBooks || '';
            document.getElementById('favPlaces').value = profile.favPlaces || '';
        }
    });

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    function handleFile(file) {
        if (!file) return;
        selectedFile = file;
        uploadPrompt.style.display = 'none';
        previewContainer.style.display = 'block';
        document.getElementById('fileNameText').textContent = file.name;

        const reader = new FileReader();
        reader.onload = (e) => {
            if (file.type.startsWith('image/')) {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').style.display = 'inline-block';
                document.getElementById('vidPreview').style.display = 'none';
            } else {
                document.getElementById('vidPreview').src = e.target.result;
                document.getElementById('vidPreview').style.display = 'block';
                document.getElementById('imgPreview').style.display = 'none';
            }
        };
        reader.readAsDataURL(file);
    }

    document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('fullName', document.getElementById('fullName').value);
        formData.append('favSongs', document.getElementById('favSongs').value);
        formData.append('favBooks', document.getElementById('favBooks').value);
        formData.append('favPlaces', document.getElementById('favPlaces').value);
        if (selectedFile) formData.append('file', selectedFile);

        const profile = JSON.parse(localStorage.getItem('userProfile'));

        try {
            const response = await fetch(`/auth/profile/${profile.username}`, {
                method: 'PUT',
                body: formData
            });
            if (response.ok) {
                const result = await response.json();
                localStorage.setItem('userProfile', JSON.stringify(result));
                window.location.href = `/profile/${result.username}`;
            }
        } catch (err) {
            alert("Update failed!");
        }
    });
</script>
</body>
</html>
