<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile | FriendBook</title>
    <th:block th:replace="~{fragments/styles :: common-head}"></th:block>
    <style>
        body { background-color: #fafafa; }
        .profile-avatar-wrap { display: flex; justify-content: center; align-items: center; position: relative; }
        .profile-avatar-image, .profile-avatar-fallback, .profile-avatar-video {
            width: 170px; height: 170px; border-radius: 50%; object-fit: cover;
            border: 4px solid #fff; box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.08);
        }
        .profile-avatar-fallback {
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f09433, #dc2743 55%, #bc1888);
            color: #fff; font-size: 3.5rem; font-weight: 700;
        }
        .section-label { letter-spacing: 0.18em; font-size: 0.8rem; }

        @media (max-width: 767px) {
            .profile-avatar-image, .profile-avatar-fallback, .profile-avatar-video { width: 120px; height: 120px; }
            .profile-avatar-fallback { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: header}"></div>

<main class="py-5">
    <div class="container">
        <section class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4 p-lg-5">
                <div class="row g-4 g-lg-5 align-items-center">
                    <div class="col-md-4">
                        <div class="profile-avatar-wrap">
                            <img id="profileImageTag" class="profile-avatar-image" style="display: none;" alt="Profile picture">
                            <video id="profileVideoTag" class="profile-avatar-video" style="display: none;" autoplay muted loop></video>
                            <div id="profileFallbackAvatar" class="profile-avatar-fallback" style="display: none;">F</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                            <h1 id="profileUsername" class="h2 fw-light mb-0">friendbook</h1>
                            <a href="/settings/profile" class="btn btn-outline-dark btn-sm px-3 py-2 fw-semibold">Edit profile</a>
                        </div>

                        <div class="row row-cols-3 g-3 mb-4 text-center text-md-start">
                            <div class="col">
                                <div class="bg-light border rounded-4 p-3 h-100">
                                    <div id="displayPostCount" class="fw-bold fs-5">0</div>
                                    <div class="text-muted small">Posts</div>
                                </div>
                            </div>
                            <div class="col">
                                <div class="bg-light border rounded-4 p-3 h-100">
                                    <div id="displayFollowerCount" class="fw-bold fs-5">0</div>
                                    <div class="text-muted small">Followers</div>
                                </div>
                            </div>
                            <div class="col">
                                <div class="bg-light border rounded-4 p-3 h-100">
                                    <div id="displayFollowingCount" class="fw-bold fs-5">0</div>
                                    <div class="text-muted small">Following</div>
                                </div>
                            </div>
                        </div>

                        <div class="fw-bold fs-5 mb-1" id="profileFullName">Friend Book</div>
                        <div class="text-muted mb-4" id="profileEmail">user@example.com</div>

                        <div class="row g-3">
                            <div class="col-lg-4 col-md-6">
                                <div class="card bg-light border-0 rounded-4 h-100">
                                    <div class="card-body">
                                        <div class="text-uppercase text-muted fw-semibold section-label mb-2">Favorite Songs</div>
                                        <div id="profileFavSongs">Add your favorite songs</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-4 col-md-6">
                                <div class="card bg-light border-0 rounded-4 h-100">
                                    <div class="card-body">
                                        <div class="text-uppercase text-muted fw-semibold section-label mb-2">Favorite Books</div>
                                        <div id="profileFavBooks">Add your favorite books</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="card bg-light border-0 rounded-4 h-100">
                                    <div class="card-body">
                                        <div class="text-uppercase text-muted fw-semibold section-label mb-2">Favorite Places</div>
                                        <div id="profileFavPlaces">Add your favorite places</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-header bg-white py-3">
                <div class="text-center text-uppercase fw-bold text-muted section-label">Posts</div>
            </div>

            <div id="postsContainer" class="card-body p-4 p-lg-5 pt-0">
                <div class="border border-2 border-light-subtle rounded-4 p-5 text-center bg-light">
                    <h2 class="h4 mb-2">No posts yet</h2>
                    <p class="text-muted mb-0">Moments you share will appear here.</p>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const setText = (id, value, fallback) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value && value.trim() ? value : fallback;
    };

    const updateAvatar = (username, profileMedia) => {
        const imageElement = document.getElementById('profileImageTag');
        const videoElement = document.getElementById('profileVideoTag');
        const fallbackElement = document.getElementById('profileFallbackAvatar');

        // Reset display
        imageElement.style.display = 'none';
        videoElement.style.display = 'none';
        fallbackElement.style.display = 'none';

        if (profileMedia && profileMedia !== 'default.png') {
            const extension = profileMedia.split('.').pop().toLowerCase();
            const videoExtensions = ['mp4', 'webm', 'ogg'];

            if (videoExtensions.includes(extension)) {
                videoElement.src = `/assets/${profileMedia}`;
                videoElement.style.display = 'block';
            } else {
                imageElement.src = `/assets/${profileMedia}`;
                imageElement.style.display = 'block';
            }
        } else {
            fallbackElement.style.display = 'flex';
            fallbackElement.textContent = username ? username.charAt(0).toUpperCase() : 'F';
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        const savedProfile = localStorage.getItem('userProfile');
        if (savedProfile) {
            const profile = JSON.parse(savedProfile);

            setText('profileUsername', profile.username, 'friendbook');
            setText('profileFullName', profile.fullName, 'Friend Book');
            setText('profileEmail', profile.email, 'user@example.com');
            setText('profileFavSongs', profile.favSongs, 'Add your favorite songs');
            setText('profileFavBooks', profile.favBooks, 'Add your favorite books');
            setText('profileFavPlaces', profile.favPlaces, 'Add your favorite places');

            document.getElementById('displayPostCount').textContent = profile.postCount || 0;
            document.getElementById('displayFollowerCount').textContent = profile.followerCount || 0;
            document.getElementById('displayFollowingCount').textContent = profile.followingCount || 0;

            updateAvatar(profile.username, profile.profileImage);
        }
    });
</script>
</body>
</html>
