<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FriendBook | Connect</title>

    <script th:src="|https://www.google.com/recaptcha/api.js?render=6LcQgJsrAAAAAIh7ctqhSrxCrksu6TL2lvFWp15O|"></script>

    <th:block th:replace="~{fragments/styles :: common-head}"></th:block>
</head>
<body>

<div th:replace="~{fragments/navbar :: header}"></div>

<header class="hero-section text-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="display-3 fw-bold mb-4">Share Your Moments</h1>
                <p class="lead mb-5">Join the FriendBook community to connect with friends, share photos, and discover what's happening around the world.</p>
                <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                    <a th:href="@{/signup}" class="btn btn-light btn-lg px-5 fw-bold text-danger">Get Started</a>
                    <a th:href="@{/about}" class="btn btn-outline-light btn-lg px-5">Learn More</a>
                </div>
            </div>
        </div>
    </div>
</header>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
