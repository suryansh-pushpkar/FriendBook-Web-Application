<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | FriendBook</title>
    <th:block th:replace="~{fragments/styles :: common-head}"></th:block>

    <script th:src="|https://www.google.com/recaptcha/api.js?render=6LfxnY0sAAAAAAHD5n738xWvgiNERN--S1dFgdaR|"></script>

    <style>
        .signup-card {
            max-width: 400px;
            margin: 80px auto;
            border: 1px solid #dbdbdb;
            background-color: #fff;
            padding: 40px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: header}"></div>

<div class="container">
    <div class="signup-card shadow-sm rounded">
        <h2 class="brand-logo text-center mb-4">FriendBook</h2>
        <p class="text-muted text-center mb-4">Sign up to see photos from your friends.</p>

        <form id="signupForm"  >
            <div class="mb-3">
                <input type="text" id="fullName" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password"
                       required minlength="8" title="Minimum 8 characters">
            </div>

            <input type="hidden" id="g-recaptcha-response" name="g-recaptcha-response">

            <button type="submit" class="btn btn-primary w-100 fw-bold">Sign Up</button>
        </form>

        <div id="message" class="mt-3 small text-center"></div>

        <hr>
        <p class="text-center mb-0">
            Have an account? <a th:href="@{/login}" class="text-decoration-none fw-bold">Log in</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/signup.js}"></script>
</body>
</html>
