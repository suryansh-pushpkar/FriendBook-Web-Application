<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | FriendBook</title>
    <th:block th:replace="~{fragments/styles :: common-head}"></th:block>

    <style>
        .login-card {
            max-width: 380px;
            margin: 100px auto;
            border: 1px solid #dbdbdb;
            background-color: #fff;
            padding: 40px;
        }
        .login-card .form-control {
            background-color: #fafafa;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: header}"></div>

<div class="container">
    <div class="login-card shadow-sm rounded">
        <h2 class="brand-logo text-center mb-4">FriendBook</h2>

        <form id="loginForm">
            <div class="mb-3">
                <input type="email" id="email" class="form-control py-2"
                       placeholder="Email" required autofocus>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control py-2"
                       placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Log In</button>
        </form>

        <div id="loginMessage" class="mt-3 small text-center"></div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small text-center" role="alert">
            Either email or password is incorrect try again
        </div>

        <div th:if="${param.logout}" class="alert alert-info py-2 small text-center" role="alert">
            You have been logged out.
        </div>

        <div class="text-center mt-4">
            <p class="small text-muted mb-0">
                Don't have an account? <a th:href="@{/signup}" class="text-decoration-none fw-bold">Sign up</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{../static/css/js/login.js}"></script></body>
</body>
</html>
